
services:
  app:
    build: .
    container_name: cms-app
    volumes:
      - .:/var/www
    depends_on:
      - mysql
      - redis
    ports:
      - "9000:9000"
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: cms_service
      DB_USERNAME: root
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379

  mysql:
    image: mysql:8
    container_name: cms-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: cms_service
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:alpine
    container_name: cms-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  mysql_data: