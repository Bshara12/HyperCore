services:

  # ================= CMS =================

  cms-app-1:
    build: ./projects/cms-service
    volumes:
      - ./projects/cms-service:/var/www
    networks: [core]
    restart: unless-stopped

  cms-app-2:
    build: ./projects/cms-service
    volumes:
      - ./projects/cms-service:/var/www
    networks: [core]
    restart: unless-stopped

  cms-nginx:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./projects/cms-service:/var/www
      - ./projects/cms-service/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - cms-app-1
      - cms-app-2
    networks: [core]
    restart: unless-stopped

  cms-mysql-master:
    image: mysql:8
    environment:
      MYSQL_DATABASE: cms_service
      MYSQL_ROOT_PASSWORD: secret
    volumes:
      - cms_master_data:/var/lib/mysql
      - ./mysql/cms/master.cnf:/etc/mysql/conf.d/master.cnf
    networks: [core]

  # cms-mysql-slave:
  #   image: mysql:8
  #   environment:
  #     MYSQL_ROOT_PASSWORD: secret
  #   volumes:
  #     - cms_slave_data:/var/lib/mysql
  #     - ./mysql/cms/slave.cnf:/etc/mysql/conf.d/slave.cnf
  #   networks: [core]

  cms-redis:
    image: redis:alpine
    networks: [core]


  # ================= LOGGING =================

  logging-app:
    build: ./projects/logging-service
    volumes:
      - ./projects/logging-service:/var/www/html
    networks: [core]

  logging-nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./projects/logging-service:/var/www/html
      - ./projects/logging-service/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - logging-app
    networks: [core]

  logging-mysql:
    image: mysql:8
    environment:
      MYSQL_DATABASE: logging_service
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - logging_data:/var/lib/mysql
    networks: [core]


  # ================= AUTH =================

  auth-app-1:
    build: ./projects/auth-service
    volumes:
      - ./projects/auth-service:/var/www
    networks: [core]
    restart: unless-stopped

  auth-app-2:
    build: ./projects/auth-service
    volumes:
      - ./projects/auth-service:/var/www
    networks: [core]
    restart: unless-stopped

  auth-nginx:
    image: nginx:alpine
    ports:
      - "8003:80"
    volumes:
      - ./projects/auth-service:/var/www
      - ./projects/auth-service/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - auth-app-1
      - auth-app-2
    networks: [core]
    restart: unless-stopped

  auth-mysql-master:
    image: mysql:8
    environment:
      MYSQL_DATABASE: auth_service
      MYSQL_ROOT_PASSWORD: secret
    volumes:
      - auth_master_data:/var/lib/mysql
      - ./mysql/auth/master.cnf:/etc/mysql/conf.d/master.cnf
    networks: [core]

  # auth-mysql-slave:
  #   image: mysql:8
  #   environment:
  #     MYSQL_ROOT_PASSWORD: secret
  #   volumes:
  #     - auth_slave_data:/var/lib/mysql
  #     - ./mysql/auth/slave.cnf:/etc/mysql/conf.d/slave.cnf
  #   networks: [core]

  auth-redis:
    image: redis:alpine
    networks: [core]


  # ================= ECOMMERCE =================

  ecommerce-app-1:
    build: ./projects/E-Commerce_Service
    volumes:
      - ./projects/E-Commerce_Service:/var/www
    networks: [core]
    restart: unless-stopped

  ecommerce-app-2:
    build: ./projects/E-Commerce_Service
    volumes:
      - ./projects/E-Commerce_Service:/var/www
    networks: [core]
    restart: unless-stopped

  ecommerce-nginx:
    image: nginx:alpine
    ports:
      - "8002:80"
    volumes:
      - ./projects/E-Commerce_Service:/var/www
      - ./projects/E-Commerce_Service/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - ecommerce-app-1
      - ecommerce-app-2
    networks: [core]
    restart: unless-stopped

  ecommerce-mysql-master:
    image: mysql:8
    environment:
      MYSQL_DATABASE: ecommerce_service
      MYSQL_ROOT_PASSWORD: secret
    volumes:
      - ecommerce_master_data:/var/lib/mysql
      - ./mysql/ecommerce/master.cnf:/etc/mysql/conf.d/master.cnf
    networks: [core]

  # ecommerce-mysql-slave:
  #   image: mysql:8
  #   environment:
  #     MYSQL_ROOT_PASSWORD: secret
  #   volumes:
  #     - ecommerce_slave_data:/var/lib/mysql
  #     - ./mysql/ecommerce/slave.cnf:/etc/mysql/conf.d/slave.cnf
  #   networks: [core]

  ecommerce-redis:
    image: redis:alpine
    networks: [core]


  # ================= BOOKING =================

  booking-app-1:
    build: ./projects/Booking_Service
    volumes:
      - ./projects/Booking_Service:/var/www
    networks: [core]
    restart: unless-stopped

  booking-app-2:
    build: ./projects/Booking_Service
    volumes:
      - ./projects/Booking_Service:/var/www
    networks: [core]
    restart: unless-stopped

  booking-nginx:
    image: nginx:alpine
    ports:
      - "8004:80"
    volumes:
      - ./projects/Booking_Service:/var/www
      - ./projects/Booking_Service/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - booking-app-1
      - booking-app-2
    networks: [core]
    restart: unless-stopped

  booking-mysql-master:
    image: mysql:8
    environment:
      MYSQL_DATABASE: booking_service
      MYSQL_ROOT_PASSWORD: secret
    volumes:
      - booking_master_data:/var/lib/mysql
      - ./mysql/booking/master.cnf:/etc/mysql/conf.d/master.cnf
    networks: [core]

  # booking-mysql-slave:
  #   image: mysql:8
  #   environment:
  #     MYSQL_ROOT_PASSWORD: secret
  #   volumes:
  #     - booking_slave_data:/var/lib/mysql
  #     - ./mysql/booking/slave.cnf:/etc/mysql/conf.d/slave.cnf
  #   networks: [core]

  booking-redis:
    image: redis:alpine
    networks: [core]


  # ================= RABBITMQ =================

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: appuser
      RABBITMQ_DEFAULT_PASS: apppass
    networks: [core]


networks:
  core:


volumes:
  cms_master_data:
  cms_slave_data:
  auth_master_data:
  auth_slave_data:
  ecommerce_master_data:
  ecommerce_slave_data:
  booking_master_data:
  booking_slave_data:
  logging_data: